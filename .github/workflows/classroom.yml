name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Chapter 1 Check
      id: chapter-1-check
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Chapter 1 Check
        setup-command: ''
        command: python3 test_ch1.py
        timeout: 1
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHAPTER-1-CHECK_RESULTS: "${{steps.chapter-1-check.outputs.result}}"
      with:
        runners: chapter-1-check
